[project]
name = "huginn-hub"
version = "0.1.0"
description = "Huginn hub — central control plane for the VM fleet"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "argon2-cffi>=23.1",
    "pyjwt[crypto]>=2.8",
    "httpx>=0.27",
    "python-multipart>=0.0.9",
    "ldap3>=2.9",
    "croniter>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "aiosqlite>=0.20",
    "ruff>=0.5",
    "mypy>=1.10",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S", "ASYNC"]
ignore = [
    "S101",      # asserts are fine in tests
    "B008",      # FastAPI Depends() in argument defaults is the idiomatic pattern
    "ASYNC109",  # `timeout` here is a task-data field, not an asyncio timeout
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S105", "S106", "S107"]
# "bearer" token_type literal is not a credential.
"app/schemas/auth.py" = ["S105"]
# Placeholder default secrets in settings are not real credentials.
"app/config.py" = ["S105"]
# Alembic migrations are largely autogenerated.
"alembic/versions/*" = ["E501"]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
warn_unused_ignores = true
disallow_untyped_defs = true
ignore_missing_imports = true
explicit_package_bases = true
exclude = ["alembic/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
